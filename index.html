<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Document</title>
  </head>
  <body>
    <nav>
      <div class="nav-bar">
        <div class="container pt-2 d-flex justify-content-between align-content-center">
          <div class="logo-nav col-1">
            <img src="imges/logo.png" alt="#" class="w-100" />
          </div>
          <div
            class="center-nav col-6 d-flex justify-content-center align-content-center"
          >
            <div
              class="hotline d-flex justify-content-center align-content-center"
            >
              <i class="fa-solid fa-phone p-4"></i>
              <div class="contact-num me-2 mb-0">
                <p>
                  <span>Contact us 24/7</span>
                </p>
                <p>
                  <span>(+92) 3942 7879</span>
                </p>
              </div>
            </div>
            <div
              class="search-bar border border-1 d-flex justify-content-center py-1"
            >
              <div class="dropdown d-flex">
                <button
                  class="btn dropdown-toggle"
                  type="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  All Categories
                </button>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">All Categories</a></li>
                  <li><a class="dropdown-item" href="#">Autopart</a></li>
                  <li><a class="dropdown-item" href="#"> Accessories</a></li>
                  <li><a class="dropdown-item" href="#"> Car Care</a></li>
                  <li>
                    <a class="dropdown-item" href="#"> Car Electronics</a>
                  </li>
                </ul>
              </div>
              <form class="d-flex" role="search">
                <input
                  id="border-0"
                  class="form-control me-2"
                  type="search"
                  placeholder="Search For product"
                  aria-label="Search"
                />
                <button class="btn btn-outline-success me-1" type="submit">
                  <i class="fa-solid fa-magnifying-glass"></i>
                </button>
              </form>
            </div>
          </div>
          <div
            class="right-nav col-4 d-flex align-content-center justify-content-center me-3"
          >
            <button type="button" class="btn col-3 d-flex">
              <div class="egp-imge">
                <img src="imges/flag-for-flag-egypt-svgrepo-com.svg" alt="#" />
              </div>
              Arabic
            </button>
            <div class="dropdown">
              <button
                class="btn dropdown-toggle"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                USD
              </button>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">EGP</a></li>
                <li><a class="dropdown-item" href="#">EUR</a></li>
                <li><a class="dropdown-item" href="#">SUR</a></li>
                <li><a class="dropdown-item" href="#">AED</a></li>
              </ul>
              <button type="button" class="btn">
                <i class="fa-solid fa-user"></i> Account
              </button>
              <i class="fa-solid fa-heart"></i>
              <i class="fa-solid fa-cart-shopping"></i>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
